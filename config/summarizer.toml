[paths]
zotero_storage_path = "~/Zotero/storage"
obsidian_vault_path = "~/Obsidian/Offline AI Workflow"
literature_note_folder = "Literature"
template_path = "obsidian/templates/base-note.md"
manifest_path = "~/Obsidian/Offline AI Workflow/.mcp/embedding_manifest.jsonl"

[text_extractor]
provider = "local-command"
command = ["pdftotext", "-layout", "{pdf}", "-"]
max_chars = 120000

[summarizer]
provider = "ollama-api"
command = []
model = "qwen3.5:4b-mlx"
endpoint = "http://127.0.0.1:11434/api/generate"
think = false
max_input_chars = 2200
max_output_tokens = 700
timeout_seconds = 300

[embeddings]
provider = "local-command"
command = []
index_name = "obsidian-literature"
chunk_strategy = "section"
